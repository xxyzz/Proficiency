name: Test

on:
  workflow_dispatch:
  push:
    branches:  # ignore pushed tags
      - "*"
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'

permissions:
  contents: read
  pull-requests: read

jobs:
  tests:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
      - run: python -m pip install .
      - run: python -m unittest discover -b -s tests
