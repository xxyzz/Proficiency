on:
  push:
    tags:
      - 'v*'

name: Create Release

jobs:
  create_release:
    runs-on: ubuntu-latest
    steps:
      - uses: dawidd6/action-download-artifact@v2
        with:
          workflow: build.yml
          commit: ${{ github.sha }}

      - run: gh release create ${GITHUB_REF_NAME} **/*.tar.gz en/kindle_lemmas_dump_*
        env:
          GH_TOKEN: ${{ github.token }}