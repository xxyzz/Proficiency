name: Create files

on:
  workflow_dispatch:
  push:
    tags:
      - '*'
    paths-ignore:
      - '**.md'

permissions:
  contents: write

jobs:
  create_files:
    name: Create files
    runs-on: ubuntu-latest
    strategy:
      matrix:
        gloss_lang: ['de', 'el', 'en', 'es', 'fr', 'he', 'it', 'ja', 'nl', 'pl', 'pt', 'ru', 'th', 'zh', 'ko']
    env:
      GH_TELEMETRY: false
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6

      - if: matrix.edition == 'en'
        run: gh release create ${{ github.ref_name }} -d
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install package
        run: |
          sudo apt install -y lbzip2
          python -m pip install .[dev]

      - name: Get kaikki date
        id: kaikki-date
        run: |
          echo "date=$(python kaikki.py ${{ matrix.gloss_lang }})" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        with:
          path: build/${{ matrix.gloss_lang }}.jsonl.gz
          key: ${{ matrix.gloss_lang }}-${{ steps.kaikki-date.outputs.date }}

      - name: Create files
        run: proficiency ${{ matrix.gloss_lang }}
        env:
          PYTHONOPTIMIZE: 1
          PYTHONWARNINGS: default

      - run: gh release upload ${{ github.ref_name }} build/**/*.bz2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - if: matrix.edition == 'en'
        run: gh release upload ${{ github.ref_name }} build/**/*.zst
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    needs: create_files
    if: needs.create_files.result == 'success'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_TELEMETRY: false
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
      - run: |
          python -m pip install .
          checksum ${{ github.ref_name }}
      - run: gh upload ${{ github.ref_name }} build/sha256.json
      - run: gh release edit ${{ github.ref_name }} --draft=false --latest
